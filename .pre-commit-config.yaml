repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-json
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.10
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.ya?ml$
  - repo: local
    hooks:
      - id: luacheck
        name: luacheck
        language: system
        entry: luacheck
        types: [lua]
        files: \.lua$
      - id: selene
        name: selene
        language: system
        entry: bash -c 'cd nvim && selene --config selene.toml .config/nvim/lua'
        pass_filenames: false
        types: [lua]
        files: ^nvim/
      - id: stylua
        name: stylua
        language: system
        entry: stylua --check --search-parent-directories
        types: [lua]
        files: ^(nvim|wezterm)/
      - id: shellcheck
        name: shellcheck
        language: system
        entry: shellcheck --rcfile=nvim/.shellcheckrc
        types: [shell]
        files: \.sh$
        exclude: ^ai/\.claude/(shell-snapshots|plugins/cache)/
      - id: zsh-syntax
        name: zsh syntax check
        language: system
        entry: zsh -n
        files: ^zsh/
      - id: zizmor
        name: zizmor
        language: system
        entry: zizmor --config nvim/zizmor.yaml .github/workflows
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$
      - id: markdownlint
        name: markdownlint
        language: system
        entry: markdownlint --ignore-path nvim/.markdownlintignore
        types: [markdown]
        files: \.md$
        exclude: ^(graphify-out/|ai/\.claude/)
