repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
  - repo: local
    hooks:
      - id: luacheck
        name: luacheck
        language: system
        entry: luacheck
        types: [lua]
        files: \.lua$
      - id: selene
        name: selene
        language: system
        entry: bash -c 'cd nvim && selene --config selene.toml .config/nvim/lua'
        pass_filenames: false
        types: [lua]
        files: ^nvim/
      - id: stylua
        name: stylua
        language: system
        entry: stylua --check --search-parent-directories
        types: [lua]
        files: ^nvim/
      - id: shellcheck
        name: shellcheck
        language: system
        entry: shellcheck --rcfile=nvim/.shellcheckrc
        types: [shell]
        exclude: ^ai/\.claude/(shell-snapshots|plugins/cache)/
      - id: markdownlint
        name: markdownlint
        language: system
        entry: markdownlint
        types: [markdown]
