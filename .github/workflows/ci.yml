name: Tests

on: [push, pull_request]

permissions:
  contents: read

jobs:
  unit_tests:
    name: unit tests
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        rev: [nightly]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.rev }}

      # act copies the host repo and skips checkout auth; SSH remotes fail ls-remote in the container.
      - name: Use HTTPS origin in act
        if: env.ACT
        run: git remote set-url origin "https://github.com/${{ github.repository }}.git"

      - name: Prepare
        run: |
          cd nvim/.config/nvim
          make prepare

      - name: Run tests
        run: |
          nvim --version
          cd nvim/.config/nvim
          make test 2>&1 | tee /tmp/test-output.txt
          exit "${PIPESTATUS[0]}"

      - name: Generate test summary
        if: always()
        run: |
          sed 's/\x1b\[[0-9;]*m//g' /tmp/test-output.txt | awk '
          BEGIN {
            print "## Test Results\n"
            print "| File | ✅ Success | ❌ Failed | 💥 Errors | Status |"
            print "|------|:---------:|:--------:|:--------:|--------|"
            total_s=0; total_f=0; total_e=0
          }
          /^Testing:/ {
            gsub(/\t/, "")
            sub("Testing: *", "")
            current = $0
            n = split(current, parts, "/")
            fname = parts[n]
          }
          /^Success:/ {
            gsub(/\t/, "")
            match($0, /[0-9]+/)
            s = substr($0, RSTART, RLENGTH)+0
            total_s += s
          }
          /^Failed :/ {
            gsub(/\t/, "")
            match($0, /[0-9]+/)
            f = substr($0, RSTART, RLENGTH)+0
            total_f += f
          }
          /^Errors :/ {
            gsub(/\t/, "")
            match($0, /[0-9]+/)
            e = substr($0, RSTART, RLENGTH)+0
            total_e += e
            status = (f==0 && e==0) ? "✅ Pass" : "❌ **Fail**"
            print "| `" fname "` | " s " | " f " | " e " | " status " |"
          }
          END {
            print ""
            status = (total_f==0 && total_e==0) ? "✅" : "❌"
            print "**Total " status ":** " total_s " passed · " total_f " failed · " total_e " errors"
          }
          ' >> "$GITHUB_STEP_SUMMARY"
